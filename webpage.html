<!DOCTYPE html>
<html>
<head>
    <title>CSS Background Styles</title>
    <style>
        body {
            background-color: lightblue;
            background-image: url('https://via.placeholder.com/800');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        h1 {
            color: white;
            text-align: center;
            margin-top: 100px;
        }
        p {
            color: black;
            text-align: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Webpage</h1>
    <p>This page demonstrates CSS background styles.</p>

</body>
</html>
